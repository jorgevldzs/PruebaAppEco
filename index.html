<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVision - Clasificador de Basura IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e12;
            --bg-surface: #151a21;
            --accent-green: #00ff88;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffd600;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --organic: #4ade80;
            --recyclable: #3b82f6;
            --non-recyclable: #ef4444;
            --hazardous: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255, 214, 0, 0.05) 0%, transparent 50%);
            z-index: 0;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .camera-section {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .camera-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue), var(--accent-yellow));
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 136, 0.2);
        }

        #video, #canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #video.active, #canvas.active {
            display: block;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
        }

        .placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            stroke: var(--accent-green);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            color: var(--bg-dark);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            border-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        .results-section {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 300px;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .results-section.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .category-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .category-organic { background: linear-gradient(135deg, var(--organic), #22c55e); }
        .category-recyclable { background: linear-gradient(135deg, var(--recyclable), #2563eb); }
        .category-non-recyclable { background: linear-gradient(135deg, var(--non-recyclable), #dc2626); }
        .category-hazardous { background: linear-gradient(135deg, var(--hazardous), #d97706); }

        .result-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .result-info p {
            color: var(--text-secondary);
        }

        .result-details {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .result-details h4 {
            color: var(--accent-green);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-details p {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 1rem;
            border: 4px solid rgba(0, 255, 136, 0.2);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--non-recyclable);
            padding: 1rem;
            border-radius: 12px;
            color: var(--non-recyclable);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .confidence-bar {
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            transition: width 1s ease;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EcoVision</h1>
            <p class="subtitle">Clasificador Inteligente de Basura con IA</p>
        </header>

        <div class="main-content">
            <div class="camera-section">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <div class="placeholder" id="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        <p>Captura o sube una foto de basura</p>
                    </div>
                </div>

                <div class="controls">
                    <button id="startCamera" class="btn-primary">
                        <span>📸 Iniciar Cámara</span>
                    </button>
                    <button id="capture" class="btn-primary" style="display: none;">
                        <span>✨ Capturar y Analizar</span>
                    </button>
                    <div class="file-input-wrapper">
                        <button class="btn-secondary">
                            <span>📁 Subir Imagen</span>
                        </button>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>
                    <button id="stopCamera" class="btn-secondary" style="display: none;">
                        <span>⏹️ Detener</span>
                    </button>
                </div>
            </div>

            <div class="results-section" id="results">
                <!-- Los resultados se mostrarán aquí -->
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const placeholder = document.getElementById('placeholder');
        const startCameraBtn = document.getElementById('startCamera');
        const captureBtn = document.getElementById('capture');
        const stopCameraBtn = document.getElementById('stopCamera');
        const fileInput = document.getElementById('fileInput');
        const results = document.getElementById('results');

        let stream = null;

        // Iniciar cámara
        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.classList.add('active');
                canvas.classList.remove('active');
                placeholder.style.display = 'none';
                
                startCameraBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                stopCameraBtn.style.display = 'inline-block';
            } catch (err) {
                showError('No se pudo acceder a la cámara. Por favor, verifica los permisos.');
            }
        });

        // Capturar imagen
        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            video.classList.remove('active');
            canvas.classList.add('active');
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            analyzeImage(imageData);
        });

        // Detener cámara
        stopCameraBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.classList.remove('active');
            canvas.classList.remove('active');
            placeholder.style.display = 'block';
            
            startCameraBtn.style.display = 'inline-block';
            captureBtn.style.display = 'none';
            stopCameraBtn.style.display = 'none';
        });

        // Subir imagen
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        video.classList.remove('active');
                        canvas.classList.add('active');
                        placeholder.style.display = 'none';
                        
                        const imageData = canvas.toDataURL('image/jpeg', 0.8);
                        analyzeImage(imageData);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        async function analyzeImage(imageData) {
            showLoading();
            
            try {
                const base64Data = imageData.split(',')[1];
                
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: [
                                {
                                    type: 'image',
                                    source: {
                                        type: 'base64',
                                        media_type: 'image/jpeg',
                                        data: base64Data
                                    }
                                },
                                {
                                    type: 'text',
                                    text: `Analiza esta imagen e identifica el tipo de basura. Responde ÚNICAMENTE en formato JSON con esta estructura exacta:
{
  "tipo": "orgánico|reciclable|no reciclable|peligroso",
  "nombre": "nombre específico del objeto",
  "descripcion": "descripción breve del item",
  "instrucciones": "cómo debe desecharse correctamente",
  "confianza": número entre 0 y 100
}

No incluyas markdown, solo el JSON puro.`
                                }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error('Error en la respuesta de la API');
                }

                const data = await response.json();
                const textContent = data.content.find(c => c.type === 'text')?.text || '';
                
                // Limpiar la respuesta para obtener solo el JSON
                let jsonText = textContent.trim();
                jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                
                const result = JSON.parse(jsonText);
                displayResults(result);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Hubo un error al analizar la imagen. Por favor, intenta de nuevo.');
            }
        }

        function showLoading() {
            results.classList.add('active');
            results.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Analizando imagen con IA...</p>
                </div>
            `;
        }

        function displayResults(result) {
            const categoryMap = {
                'orgánico': { icon: '🌱', class: 'category-organic' },
                'reciclable': { icon: '♻️', class: 'category-recyclable' },
                'no reciclable': { icon: '🗑️', class: 'category-non-recyclable' },
                'peligroso': { icon: '⚠️', class: 'category-hazardous' }
            };

            const category = categoryMap[result.tipo] || categoryMap['no reciclable'];

            results.innerHTML = `
                <div class="result-header">
                    <div class="category-icon ${category.class}">
                        ${category.icon}
                    </div>
                    <div class="result-info">
                        <h3>${result.nombre}</h3>
                        <p>Categoría: ${result.tipo.charAt(0).toUpperCase() + result.tipo.slice(1)}</p>
                    </div>
                </div>

                <div class="result-details">
                    <h4>📋 Descripción</h4>
                    <p>${result.descripcion}</p>
                </div>

                <div class="result-details">
                    <h4>♻️ Instrucciones de Desecho</h4>
                    <p>${result.instrucciones}</p>
                </div>

                <div class="result-details">
                    <h4>🎯 Confianza del Análisis</h4>
                    <p>${result.confianza}%</p>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${result.confianza}%"></div>
                    </div>
                </div>
            `;
        }

        function showError(message) {
            results.classList.add('active');
            results.innerHTML = `
                <div class="error">
                    <h3>⚠️ Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
